<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ED Colonization Tracker</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-title">ED Colonization Tracker</div>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-out">−</button>
        <span class="zoom-display" id="zoom-display">100%</span>
        <button class="zoom-btn" id="zoom-in">+</button>
      </div>
      <div class="header-status">
        <button class="archived-btn" id="archived-btn" title="Archived constructions">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="5" rx="1"/>
            <path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/>
            <line x1="10" y1="12" x2="10" y2="17"/>
            <line x1="14" y1="12" x2="14" y2="17"/>
          </svg>
        </button>
        <div class="status-widget" id="status-widget">
          <div class="status-icon" id="status-icon">✓</div>
          <div class="status-count" id="status-count"></div>
        </div>
        <div class="status-dropdown" id="status-dropdown">
          <div class="status-header">Session Errors</div>
          <div class="status-list" id="status-list"></div>
        </div>
      </div>
    </header>

    <div class="ship-bar" id="ship-bar">
      <div class="ship-bar-item">
        <span class="ship-bar-label">SHIP</span>
        <span class="ship-bar-value" id="ship-name">—</span>
      </div>
      <div class="ship-bar-sep"></div>
      <div class="ship-bar-item">
        <span class="ship-bar-label">HULL</span>
        <span class="ship-bar-value" id="ship-hull">—</span>
      </div>
      <div class="ship-bar-sep"></div>
      <div class="ship-bar-item">
        <span class="ship-bar-label">JUMP RANGE</span>
        <span class="ship-bar-value" id="ship-jump">—</span>
      </div>
      <div class="ship-bar-sep"></div>
      <div class="ship-bar-item">
        <span class="ship-bar-label">CARGO CAPACITY</span>
        <span class="ship-bar-value" id="ship-cargo">—</span>
      </div>
    </div>

    <div class="tabs-container" id="tabs-container">
      <!-- Tabs rendered by JS -->
    </div>

    <main class="main">
      <div class="construction-card" id="construction-card">
        <!-- Construction card rendered by JS -->
      </div>
    </main>

    <div class="modal-overlay" id="delete-modal">
      <div class="delete-confirm">
        <h3>Archive Construction?</h3>
        <p id="delete-modal-text">This will archive the construction. It will be removed from the primary view but can be restored later.</p>
        <div class="delete-confirm-buttons">
          <button class="delete-confirm-btn cancel" id="delete-cancel">Cancel</button>
          <button class="delete-confirm-btn confirm" id="delete-confirm">Archive</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="archived-modal">
      <div class="archived-panel">
        <h3>Archived Constructions</h3>
        <div id="archived-list"></div>
        <div class="archived-close">
          <button class="delete-confirm-btn cancel" id="archived-close-btn">Close</button>
        </div>
      </div>
    </div>

    <div class="copy-toast" id="copy-toast">Copied!</div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
