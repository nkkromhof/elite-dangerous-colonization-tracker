<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargo Table</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #fff; min-height: 100vh; padding: 32px; }
    h2 { font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 24px; font-size: 18px; }
    .preview { background: #1a1a1a; border-radius: 12px; padding: 20px; max-width: 900px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 16px; color: #888; font-size: 16px; font-weight: 500; border-bottom: 2px solid #333; }
    td { padding: 20px 16px; font-size: 22px; border-bottom: 1px solid #252525; }
    tr:last-child td { border-bottom: none; }
    .name { font-weight: 600; color: #fff; }
    .needed { color: #D97706; }
    .carrier { color: #553F83; }
    .ship { color: #16A34A; }
    .zero { color: #444; }
    .header-row { background: #141414; }
    .option { border: 2px solid #333; border-radius: 12px; padding: 24px; cursor: pointer; max-width: 600px; margin-top: 20px; }
    .option:hover { border-color: #553F83; background: rgba(85,63,131,0.1); }
    .option.selected { border-color: #553F83; background: rgba(85,63,131,0.2); }
    h3 { font-size: 20px; margin-bottom: 6px; }
    p { color: #888; font-size: 15px; line-height: 1.5; }
  </style>
</head>
<body>
  <h2>VR-Optimized Cargo Table</h2>
  <p class="subtitle">Large rows, short headers, clear numbers</p>

  <div class="preview">
    <table>
      <tr class="header-row">
        <th>NAME</th>
        <th>NEEDED</th>
        <th>CARRIER</th>
        <th>SHIP</th>
      </tr>
      <tr>
        <td class="name">Neofab insulating membrane</td>
        <td class="needed">47 / 100</td>
        <td class="carrier">23</td>
        <td class="zero">—</td>
      </tr>
      <tr>
        <td class="name">Pertonite dust</td>
        <td class="needed">12 / 50</td>
        <td class="zero">—</td>
        <td class="ship">8</td>
      </tr>
      <tr>
        <td class="name">Tungsten</td>
        <td class="needed">200 / 200</td>
        <td class="carrier zero">—</td>
        <td class="carrier zero">—</td>
      </tr>
    </table>
  </div>

  <div class="option selected" onclick="this.classList.toggle('selected')">
    <h3>This format works</h3>
    <p>Large text, clear columns. Color-coded to quickly spot where resources are.</p>
  </div>

  <script src="/helper.js"></script>
</body>
</html>
